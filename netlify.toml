# ===================================
# Netlify Configuration - Mine360pr
# ===================================

[build]
  command = "npm ci && npm run build"  # ci es más rápido que install
  publish = "dist"
  # base = "/" - NO NECESARIO (es el default)
  # ignore y force - ELIMINADOS (causan builds innecesarios)

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"  # Por si hay conflictos de dependencias

# ===================================
# Redirects para SPA (Single Page App)
# ===================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false  # No forzar si existe el archivo

# ===================================
# Headers de Seguridad
# ===================================
[[headers]]
  for = "/*"
  [headers.values]
    # Prevenir clickjacking
    X-Frame-Options = "DENY"
    
    # Prevenir MIME sniffing
    X-Content-Type-Options = "nosniff"
    
    # Protección XSS (legacy, pero no hace daño)
    X-XSS-Protection = "1; mode=block"
    
    # Control de referrer
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permisos restrictivos
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    
    # Content Security Policy (CSP) - IMPORTANTE
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    """

# ===================================
# Cache para Assets Estáticos
# ===================================

# JavaScript y CSS con hash (vite genera nombres únicos)
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes (1 semana)
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Fuentes (1 año)
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML - No cachear para siempre tener última versión
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Manifest y favicon (1 día)
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ===================================
# Configuración de Desarrollo Local
# ===================================
[dev]
  command = "npm run dev"  # Mejor que solo "vite"
  port = 5173  # Puerto por defecto de Vite (más común que 3000)
  targetPort = 5173
  publish = "dist"
  autoLaunch = true

# ===================================
# Deploy Previews (opcional pero útil)
# ===================================
[context.deploy-preview]
  command = "npm ci && npm run build"

[context.branch-deploy]
  command = "npm ci && npm run build"

