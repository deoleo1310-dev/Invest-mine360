# ===================================
# Netlify Configuration - Mine360pr
# Optimizado para Máxima Velocidad
# ===================================

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # ✅ NUEVO: Variables para optimizar build
  NODE_OPTIONS = "--max-old-space-size=4096"
  NPM_FLAGS = "--legacy-peer-deps"

# ===================================
# OPTIMIZACIÓN: Build Plugin
# ===================================
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# ===================================
# REDIRECCIONES SPA (Optimizado)
# ===================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # ✅ NUEVO: Fuerza respuesta desde edge
  force = false
  
# ===================================
# HEADERS DE RENDIMIENTO
# ===================================

# ✅ HTML - Sin cache (siempre fresco)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ✅ JavaScript - Cache largo con hash
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    # ✅ NUEVO: Compresión
    Content-Encoding = "gzip"

# ✅ CSS - Cache largo con hash  
[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Encoding = "gzip"

# ✅ Imágenes y Fonts - Cache largo
[[headers]]
  for = "/assets/*.@(jpg|jpeg|png|gif|svg|webp|woff|woff2|ttf|eot)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ✅ Manifest y Service Worker
[[headers]]
  for = "/*.@(webmanifest|json)"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/json; charset=utf-8"

# ===================================
# HEADERS GLOBALES DE SEGURIDAD
# ===================================
[[headers]]
  for = "/*"
  [headers.values]
    # Security
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # ✅ NUEVO: Preload crítico
    Link = '''
    </assets/index.css>; rel=preload; as=style,
    </assets/index.js>; rel=preload; as=script
    '''
    
    # ✅ NUEVO: DNS Prefetch para Supabase
    X-DNS-Prefetch-Control = "on"

# ===================================
# OPTIMIZACIÓN: Edge Functions
# ===================================
[functions]
  # ✅ NUEVO: Configuración para Functions
  directory = "supabase/functions"
  node_bundler = "esbuild"

# ===================================
# COMPRESIÓN Y OPTIMIZACIÓN
# ===================================
[build.processing]
  skip_processing = false
  
[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true